<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Activity Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Auth Card -->
    <div class="card" id="authCard">
        <div class="logo">📋</div>
        <h2>CRM Activity Tracker</h2>

        <div class="tabs">
            <div class="tab active" id="tabSignup">Create Account</div>
            <div class="tab" id="tabLogin">Login</div>
        </div>

        <div id="authMessage" class="message"></div>

        <form id="signupForm">
            <div class="form-group">
                <label for="suUsername">Username</label>
                <input id="suUsername" required placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label for="suPassword">Password</label>
                <input type="password" id="suPassword" required placeholder="Create password">
            </div>
            <div class="form-group">
                <label for="suConfirm">Confirm Password</label>
                <input type="password" id="suConfirm" required placeholder="Re-enter password">
            </div>
            <button type="submit" class="btn">Create Account</button>
        </form>

        <form id="loginForm" style="display:none;">
            <div class="form-group">
                <label for="liUsername">Username</label>
                <input id="liUsername" required placeholder="Enter username">
            </div>
            <div class="form-group">
                <label for="liPassword">Password</label>
                <input type="password" id="liPassword" required placeholder="Enter password">
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
    </div>

    <!-- Main App -->
    <div id="app" style="display:none;">
        <div class="container">
            <div class="header">
                <h1>📋 CRM Activity Tracker</h1>
                <p>Track calls, meetings, emails and follow-ups</p>
                <div class="user-info">
                    User: <strong id="currentUser"></strong>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>

            <div id="appMessage" class="message app-message"></div>

            <div class="form-section">
                <form id="activityForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Activity Type *</label>
                            <select id="activityType" required>
                                <option value="">Select Type</option>
                                <option value="call">Call</option>
                                <option value="meeting">Meeting</option>
                                <option value="email">Email</option>
                                <option value="followup">Follow-up</option>
                                <option value="demo">Demo</option>
                                <option value="task">Task</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Contact Name *</label>
                            <input id="contactName" required>
                        </div>

                        <div class="form-group">
                            <label>Date & Time *</label>
                            <input type="datetime-local" id="activityDate" required>
                        </div>

                        <div class="form-group">
                            <label>Duration (mins)</label>
                            <input type="number" id="duration" min="1" max="1440">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Notes</label>
                        <textarea id="notes" placeholder="Details, outcomes, next steps"></textarea>
                    </div>

                    <div class="button-row">
                        <button type="submit" class="btn" id="submitBtn">Add Activity</button>
                        <button type="button" class="btn-secondary" onclick="tracker.clearForm()">Clear Form</button>
                    </div>
                </form>
            </div>

            <div class="activities-section">
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number" id="totalCount">0</div>
                        <div>Total</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="openCount">0</div>
                        <div>Open</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="closedCount">0</div>
                        <div>Closed</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="callCount">0</div>
                        <div>Calls</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="meetingCount">0</div>
                        <div>Meetings</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="emailCount">0</div>
                        <div>Emails</div>
                    </div>
                </div>

                <div class="filter-bar">
                    <input type="text" id="searchInput" placeholder="Search by contact name or notes">

                    <select id="statusFilter">
                        <option value="all">All Status</option>
                        <option value="open">Open</option>
                        <option value="closed">Closed</option>
                    </select>

                    <select id="typeFilter">
                        <option value="all">All Types</option>
                        <option value="call">Call</option>
                        <option value="meeting">Meeting</option>
                        <option value="email">Email</option>
                        <option value="followup">Follow-up</option>
                        <option value="demo">Demo</option>
                        <option value="task">Task</option>
                    </select>

                    <select id="dateFilter">
                        <option value="all">All Dates</option>
                        <option value="today">Today</option>
                        <option value="week">This Week</option>
                    </select>

                    <select id="sortFilter">
                        <option value="latest">Latest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="name">Name A-Z</option>
                    </select>
                </div>

                <div class="action-row">
                    <button class="btn-danger" onclick="tracker.clearAllActivities()">Clear All Activities</button>
                </div>

                <ul class="activities-list" id="activitiesList">
                    <li class="empty-state">No activities yet. Add one using the form above.</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
